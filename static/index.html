<!doctype html>
<html>
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y1YQBCQ27Z"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-Y1YQBCQ27Z');
  </script>

  <meta charset="utf-8">
  <title>Mijia Label Designer</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>
<header>
  <h1>Mijia Label Designer</h1>
  <button id="btnConnectBackend" title="Connect to the printer via the backend">Connect via backend</button>
  <div class="connection-state" id="backendState">Backend printer: disconnected</div>
  <button id="btnConnectWebBluetooth" title="Connect directly to the printer from this browser">Connect via WebBluetooth...</button>
  <div class="connection-state" id="webBluetoothState">WebBluetooth: disconnected</div>
  <div class="status" id="status">96 dots wide · loading…</div>
</header>
<main>
  <div class="stage">
    <div class="canvas-wrap" id="stage">
      <canvas id="bg" width="400" height="192"></canvas>
      <canvas id="previewBitmap" style="display:none"></canvas>
      <div id="items"></div>
    </div>
    <div class="toolbar">
      <button id="btnClear" title="Clear all">✕</button>
      <div class="sep"></div>
      <button id="btnAddText" title="Add text">🆃 Text</button>
      <button id="btnAddDate" title="Insert current date">📅 Date</button>
      <button id="btnAddBarcode" title="Add barcode">▮▯▮ Barcode</button>
      <button id="btnAddQR" title="Add QR">▦ QR</button>
      <button id="btnAddRect" title="Add rectangle">▭ Rect</button>
      <button id="btnAddLine" title="Add line">╱ Line</button>
      <button id="btnAddCircle" title="Add circle or ellipse">○ Circle</button>
      <button id="btnAddImage" title="Insert image">▧ Image</button>
      <input id="imageUpload" type="file" accept="image/*" hidden>
      <div class="sep"></div>
      <label class="toolbar-check" title="Preview at print resolution">
        <input type="checkbox" id="togglePreview">
        <span>👁 Preview</span>
      </label>
      <button id="btnDownloadLabel" title="Save the visible label for double-press printing">⇩ Save Macro</button>
      <button id="btnPrint" class="primary" title="Send to printer">🖨 Print</button>
      <div class="icon-picker" aria-label="Material Icons">
        <input id="iconSearch" type="search" placeholder="Search..." autocomplete="off">
        <div id="iconGrid" class="icon-grid" role="list" aria-label="Material Icons to add"></div>
      </div>
    </div>
  </div>
  <aside id="panel">
    <h2>Properties</h2>
    <div id="panelBody"><p class="empty">Nothing selected. Add something from the toolbar.</p></div>
  </aside>
</main>
<div id="toast"></div>
<script type="module" src="/static/app.js"></script>
</body>
</html>
